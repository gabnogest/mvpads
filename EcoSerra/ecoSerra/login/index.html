<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../login/CSS/styles.css">
    <title>Login ADM</title>
</head>
<body>
    <div class="container">
        <div class="navbar-container">
            <nav>
                 <a href="../inicio/index.html">
                    <img src="../inicio/images/Logo EcoSerra.png" alt="ecoSerra" class="logo">
                 </a>
                 <ul class="navbar-itens">
                    <li><a href="../inicio/index.html">Início</a></li>
                 </ul>
            </nav>
        </div> 
        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="admin@ecoserra.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="bio-btn" style="border: none; cursor: pointer; width: 100%;">
                Entrar no Painel
            </button>
        </form>
        <footer>
                <img src="../inicio/images/Logo EcoSerra.png" alt="ecoSerra" class="logo">
                <p>Trabalho desenvolvido para disciplina de MVP-Front-end Unifeso: <a href="">Github do projeto</a></p>
            </footer>
    </div>
<script src="JS/login.js"></script>
</body>
</html>
